<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SuperSaver Kit">
<meta name="theme-color" content="#1e1e72">
<title>SuperSaver Kit</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
:root {
  --indigo-deep: #1e1e72;
  --indigo:      #2d2d9f;
  --indigo-mid:  #3d3dbb;
  --indigo-lt:   #f0f0ff;
  --indigo-bg:   #f4f4ff;
  --gold:        #FFD700;
  --gold-lt:     rgba(255,215,0,0.18);
  --border:      #e0e0f4;
  --text-main:   #1e1e72;
  --text-sub:    #8888bb;
  --white:       #ffffff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Pretendard', sans-serif;
  background: var(--indigo-bg);
  color: var(--text-main);
  padding-bottom: 68px;
  overflow-x: hidden;
  -webkit-text-size-adjust: none;
}

/* ── 히어로 ── */
.hero {
  min-height: 100svh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  padding: 0;
  background: var(--indigo-bg);
  position: relative; overflow: hidden;
}
.hero::before { display: none; }


  .hero-header {
    display: flex; align-items: center; gap: 18px;
    margin-bottom: 20px; position: relative; z-index: 1;
  }
  .logo-wrap {
    width: 76px; height: 76px; border-radius: 18px;
    background: white; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 20px rgba(0,0,0,0.25);
    position: relative;
  }
  
  .hero-title-group { display: flex; flex-direction: column; gap: 4px; position: relative; z-index: 2; }

  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.7;transform:scale(1.25)} } 50%{opacity:.7;transform:scale(1.25)} }

/* ── 텍스트 ── */
.app-name {
  font-size: clamp(1.5rem, 5vw, 2.0rem); font-weight: 900;
  color: #ffffff; letter-spacing: -0.02em;
  text-align: left; margin-bottom: 2px;
  text-shadow: 0 1px 6px rgba(0,0,0,0.3);
  position: relative; z-index: 2;
}
.app-tagline {
  font-size: 0.75rem; font-weight: 600; color: rgba(255,255,255,0.85);
  letter-spacing: 0.14em; text-transform: uppercase;
  text-align: left; margin-bottom: 0;
}

/* ── 시세 칩 ── */
.price-chip {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--gold-lt); border: 1px solid rgba(255,215,0,0.4);
  border-radius: 32px; padding: 8px 18px; margin-bottom: 32px;
  position: relative; z-index: 1;
}
.chip-label { font-size: 0.65rem; font-weight: 700; color: rgba(255,215,0,0.7); letter-spacing: 0.1em; }
.chip-price { font-size: 1.05rem; font-weight: 900; color: var(--gold); }
.chip-krw   { font-size: 0.72rem; font-weight: 600; color: rgba(255,255,255,0.45); }
.chip-change { font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
.chip-change.up { background: rgba(46,125,50,0.3); color: #a5d6a7; }
.chip-change.dn { background: rgba(198,40,40,0.3); color: #ef9a9a; }
.chip-change.flat { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.45); }
.refresh-chip { background: none; border: none; color: rgba(255,255,255,0.35); cursor: pointer; font-size: 0.95rem; padding: 0; line-height: 1; }
.refresh-chip.spinning { animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── 기능 카드 (1열 3행) ── */
.cards { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 420px; position: relative; z-index: 1; }
.card {
  background: white; border: 1px solid var(--border);
  border-left: 4px solid var(--indigo);
  border-radius: 16px; padding: 16px 18px;
  display: flex; align-items: center; gap: 14px;
  text-decoration: none; color: var(--text-main);
  box-shadow: 0 2px 12px rgba(30,30,114,0.08);
  transition: transform 0.15s, box-shadow 0.15s;
}
.card:active { transform: scale(0.98); box-shadow: 0 1px 6px rgba(30,30,114,0.06); }
.card-icon-wrap {
  width: 44px; height: 44px; border-radius: 12px;
  background: var(--indigo-lt); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.card-icon-wrap svg { width: 22px; height: 22px; stroke: var(--indigo); fill: none; stroke-width: 2; }
.card-text { flex: 1; }
.card-name { font-size: 0.95rem; font-weight: 800; color: var(--indigo-deep); margin-bottom: 3px; }
.card-desc { font-size: 0.72rem; color: var(--text-sub); line-height: 1.4; }
.card-arrow { font-size: 1.2rem; color: var(--indigo-mid); font-weight: 300; }

/* ── 하단 탭바 ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 999;
  background: white; border-top: 1px solid var(--border);
  display: flex; height: 60px;
  box-shadow: 0 -4px 20px rgba(30,30,114,0.08);
}
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  .bottom-nav { padding-bottom: env(safe-area-inset-bottom); height: calc(60px + env(safe-area-inset-bottom)); }
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; text-decoration: none; color: #bbbbdd; font-size: 0.63rem; font-weight: 700;
  transition: color 0.15s;
}
.nav-item svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; }
.nav-item.active { color: var(--indigo); }

/* ── 히어로 밴드 (상단 인디고) ── */
.hero-band {
  width: 100%;
  background: linear-gradient(160deg, #15156a 0%, #2525a0 60%, #15156a 100%);
  display: flex; flex-direction: column; align-items: center;
  padding: 52px 24px 32px;
  position: relative; overflow: hidden;
}
.hero-band::before {
  content: ''; position: absolute; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.02) 40px),
              repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.02) 40px);
  pointer-events: none;
}
/* ── 카드 섹션 (하단 밝은 배경) ── */
.cards-section {
  width: 100%; background: var(--indigo-bg);
  padding: 20px 20px 0;
  display: flex; flex-direction: column; align-items: center;
}

</style>
</head>
<body>

<div class="hero">
  <!-- 상단 인디고 밴드 -->
  <div class="hero-band">
  <div class="hero-header" style="position:relative;z-index:2;">
  <div class="logo-wrap">
    <img src="icon.png" alt="SuperTrust" style="width:60px;height:60px;object-fit:contain;">
    <div class="live-dot"></div>
  </div>
  <div class="hero-title-group">
    <h1 class="app-name">SuperSaver Kit</h1>
    <p class="app-tagline">슈퍼세이버를 위한 필수 도구</p>
  </div>
  </div>

  <div class="price-chip" style="position:relative;z-index:1;">
    <span class="chip-label">SUT</span>
    <span id="chipPrice" class="chip-price">—</span>
    <span id="chipKrw" class="chip-krw">—</span>
    <span id="chipChange" class="chip-change flat">—</span>
    <button class="refresh-chip" onclick="fetchPrice()" id="refreshBtn">↺</button>
  </div>
  </div><!-- /hero-band -->

  <div class="cards-section">
  <div class="cards">
    <a class="card" href="guide.html">
      <div class="card-icon-wrap">
        <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
      </div>
      <div class="card-text">
        <div class="card-name">해설집</div>
        <div class="card-desc">슈퍼세이브 구조 · 수익 원리 완전 해설</div>
      </div>
      <div class="card-arrow">›</div>
    </a>
    <a class="card" href="calculator.html">
      <div class="card-icon-wrap">
        <svg viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="10" y2="10"/><line x1="14" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="10" y2="14"/><line x1="14" y1="14" x2="16" y2="14"/></svg>
      </div>
      <div class="card-text">
        <div class="card-name">계산기</div>
        <div class="card-desc">SUT 수량 · 신용대금 · Right 보상 계산</div>
      </div>
      <div class="card-arrow">›</div>
    </a>
    <a class="card" href="simulator.html">
      <div class="card-icon-wrap">
        <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
      <div class="card-text">
        <div class="card-name">시뮬레이터</div>
        <div class="card-desc">재참여 복리 · 월별 차트 · 변동 시나리오</div>
      </div>
      <div class="card-arrow">›</div>
    </a>
  </div>
  </div><!-- /cards-section -->
</div>

<nav class="bottom-nav">
  <a class="nav-item active" href="index.html">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>홈
  </a>
  <a class="nav-item" href="guide.html">
    <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>해설집
  </a>
  <a class="nav-item" href="calculator.html">
    <svg viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="10" y2="10"/><line x1="14" y1="10" x2="16" y2="10"/></svg>계산기
  </a>
  <a class="nav-item" href="simulator.html">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>시뮬레이터
  </a>
</nav>

<script>
async function fetchPrice() {
  const btn = document.getElementById('refreshBtn');
  if (btn) btn.classList.add('spinning');
  try {
    const res = await fetch(
      'https://api.coingecko.com/api/v3/simple/price?ids=super-trust&vs_currencies=usd,krw&include_24hr_change=true',
      { headers: { 'Accept': 'application/json' } }
    );
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const d = data['super-trust'];
    if (!d) throw new Error('no data');
    const c = d.usd_24h_change || 0;
    const cls = c > 0 ? 'up' : c < 0 ? 'dn' : 'flat';
    const el = (id) => document.getElementById(id);
    if (el('chipPrice'))  el('chipPrice').textContent  = d.usd.toFixed(4) + ' USDT';
    if (el('chipKrw'))    el('chipKrw').textContent    = '₩' + Math.round(d.krw).toLocaleString('ko-KR');
    const cc = el('chipChange');
    if (cc) { cc.textContent = (c > 0 ? '+' : '') + c.toFixed(2) + '%'; cc.className = 'chip-change ' + cls; }
  } catch(e) {
    const p = document.getElementById('chipPrice');
    if (p) p.textContent = '조회 실패';
    console.error('SUT fetch error:', e);
  } finally {
    if (btn) btn.classList.remove('spinning');
  }
}
fetchPrice();
setInterval(fetchPrice, 5 * 60 * 1000);
</script>
</body>
</html>
