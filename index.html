<html lang="ko">
<head>
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180x180.png">
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SuperSaver Kit">

<title>SuperSaver Kit</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
:root{
  --indigo-deep:#1e1e72;--indigo:#2d2d9f;--indigo-lt:#f0f0ff;--indigo-bg:#f4f4ff;
  --mint:#00938a;--mint-lt:#e0f5f4;--gold:#FFD700;
  --border:#e0e0f4;--gray-lt:#f4f7f9;--text-sub:#8888bb;--red:#d93025;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;-webkit-overflow-scrolling:touch;}
body{font-family:'Pretendard',sans-serif;background:var(--indigo-bg);padding-bottom:76px;visibility:hidden;}

/* ── 상단 네이비 밴드 ── */
.hero-band{
  background:linear-gradient(160deg,#15156a 0%,#2525a0 60%,#15156a 100%);
  padding:28px 18px 20px;
}
.hero-band-inner{
  max-width:500px;margin:0 auto;
  display:flex;flex-direction:column;align-items:center;
}
/* 앱 헤더 행 */
.app-row{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:14px;width:100%;position:relative;}
.app-icon{width:52px;height:52px;border-radius:14px;background:white;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(0,0,0,0.25);overflow:hidden;}
.app-icon img{width:46px;height:46px;object-fit:contain;}
.app-name{font-size:1.15rem;font-weight:900;color:white;letter-spacing:-0.02em;text-align:center;}
.app-tag{font-size:0.65rem;color:rgba(255,255,255,0.55);margin-top:1px;text-align:center;}
.admin-btn{position:absolute;top:0;right:0;width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.22);
  display:none;align-items:center;justify-content:center;
  font-size:0.95rem;text-decoration:none;}

/* SUT 시세 칩 */
.price-chip{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(255,215,0,0.12);border:1px solid rgba(255,215,0,0.3);
  border-radius:28px;padding:6px 14px;margin-bottom:14px;
}
.chip-label{font-size:0.6rem;font-weight:700;color:rgba(255,215,0,0.65);letter-spacing:0.1em;}
.chip-price{font-size:0.98rem;font-weight:900;color:var(--gold);}
.chip-krw{font-size:0.65rem;color:rgba(255,255,255,0.38);}
.chip-change{font-size:0.65rem;font-weight:700;padding:2px 7px;border-radius:16px;}
.chip-change.up{background:rgba(46,125,50,0.3);color:#a5d6a7;}
.chip-change.dn{background:rgba(198,40,40,0.3);color:#ef9a9a;}
.chip-change.flat{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.4);}
.refresh-btn{background:none;border:none;color:rgba(255,255,255,0.3);font-size:0.9rem;cursor:pointer;padding:0;line-height:1;}
.refresh-btn.spinning{animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* 사용자 행 */
.user-row{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;}
.user-avatar{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.15);
  border:1.5px solid rgba(255,255,255,0.28);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;color:white;font-size:0.9rem;}
.user-name{font-size:0.92rem;font-weight:700;color:white;}
.user-email{font-size:0.65rem;color:rgba(255,255,255,0.5);margin-top:1px;}
.approved-badge{background:rgba(255,215,0,0.15);
  border:1px solid rgba(255,215,0,0.28);border-radius:16px;
  padding:2px 8px;font-size:0.58rem;font-weight:700;color:var(--gold);white-space:nowrap;}
/* 로그아웃 버튼 (hero 안) */
.btn-logout-hero{
  background:rgba(217,48,37,0.15);border:1px solid rgba(217,48,37,0.35);
  border-radius:16px;padding:5px 13px;
  font-size:0.68rem;font-weight:700;color:#ff8a80;
  font-family:'Pretendard',sans-serif;cursor:pointer;white-space:nowrap;
  margin-left:auto;flex-shrink:0;
}

/* ── 컨테이너 ── */
.container{max-width:860px;margin:0 auto;padding:12px 14px 0;}

/* ── 섹션 카드 ── */
.section{background:white;border-radius:16px;padding:14px 15px;margin-bottom:10px;border:1px solid var(--border);box-shadow:0 1px 8px rgba(30,30,114,0.05);}
.section-title{font-size:0.68rem;font-weight:700;color:var(--text-sub);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px;}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);}
.info-row:last-child{border-bottom:none;padding-bottom:0;}
.info-label{font-size:0.78rem;color:var(--text-sub);}
.info-value{font-size:0.82rem;font-weight:700;color:var(--indigo-deep);}
.badge-approved{background:var(--mint-lt);color:var(--mint);font-size:0.62rem;font-weight:700;padding:2px 8px;border-radius:8px;}

/* ── 시뮬레이션 아이템 ── */
.sim-item{padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.sim-item:last-child{border-bottom:none;}
.sim-item-inner{display:flex;align-items:flex-start;gap:9px;}
.sim-check{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);background:white;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:all 0.15s;}
.sim-check.checked{border-color:var(--indigo);background:var(--indigo);}
.sim-check svg{display:none;width:11px;height:11px;stroke:white;stroke-width:3;fill:none;}
.sim-check.checked svg{display:block;}

/* 비교 모드 버튼 */
.btn-cmp-mode{font-size:0.68rem;font-weight:700;padding:4px 10px;border-radius:18px;
  border:1.5px solid var(--indigo);background:white;color:var(--indigo);
  font-family:'Pretendard',sans-serif;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.btn-cmp-mode.on{background:var(--indigo);color:white;}

/* 비교 플로팅 바 */
.compare-bar{
  background:var(--indigo);border-radius:14px;margin:0 0 10px;
  padding:12px 15px;display:flex;align-items:center;justify-content:space-between;gap:10px;
  box-shadow:0 6px 20px rgba(30,30,114,0.3);
  transition:opacity 0.2s,transform 0.2s;
  opacity:0;transform:translateY(6px);pointer-events:none;
}
.compare-bar.active{opacity:1;transform:translateY(0);pointer-events:all;}
.btn-do-compare{padding:8px 16px;background:var(--gold);color:var(--indigo-deep);border:none;
  border-radius:9px;font-family:'Pretendard',sans-serif;font-size:0.78rem;font-weight:900;cursor:pointer;}
.btn-do-compare:disabled{background:rgba(255,255,255,0.2);color:rgba(255,255,255,0.4);cursor:default;}
.btn-bar-cancel{background:none;border:none;color:rgba(255,255,255,0.45);font-size:1.1rem;cursor:pointer;padding:0 2px;}

/* 비교 결과 모달 */
#compare-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9999;overflow-y:auto;padding:16px;}
.cmp-inner{background:white;border-radius:18px;padding:18px;max-width:640px;margin:0 auto;position:relative;}
.cmp-inner h3{font-size:0.95rem;font-weight:900;color:var(--indigo-deep);margin-bottom:14px;text-align:center;}
.cmp-close-btn{position:absolute;top:14px;right:14px;background:var(--gray-lt);border:none;width:28px;height:28px;border-radius:50%;font-size:1rem;cursor:pointer;}
.cmp-header{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.cmp-head-card{border-radius:10px;padding:10px;text-align:center;}
.cmp-head-a{background:linear-gradient(135deg,#1e1e72,#2d2d9f);}
.cmp-head-b{background:linear-gradient(135deg,#00938a,#00bdb0);}
.cmp-head-label{font-size:0.58rem;font-weight:700;color:rgba(255,255,255,0.6);letter-spacing:0.1em;margin-bottom:3px;}
.cmp-head-title{font-size:0.78rem;font-weight:900;color:white;line-height:1.3;word-break:keep-all;}
.cmp-head-date{font-size:0.62rem;color:rgba(255,255,255,0.55);margin-top:2px;}
.cmp-block{margin-bottom:12px;}
.cmp-block-title{font-size:0.65rem;font-weight:700;color:var(--text-sub);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px;border-left:3px solid var(--indigo);padding-left:7px;}
.cmp-row{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--border);}
.cmp-row:last-child{border-bottom:none;}
.cmp-cell{padding:7px 8px;font-size:0.75rem;}
.cmp-lbl{color:var(--text-sub);font-weight:500;font-size:0.7rem;background:var(--gray-lt);}
.cmp-a{color:var(--indigo-deep);font-weight:700;text-align:right;}
.cmp-b{color:var(--mint);font-weight:700;text-align:right;}
.win-badge{font-size:0.58rem;font-weight:700;padding:1px 4px;border-radius:5px;margin-left:2px;vertical-align:middle;}
.win-a{background:rgba(30,30,114,0.1);color:var(--indigo);}
.win-b{background:rgba(0,147,138,0.12);color:var(--mint);}

/* 상세 모달 */
#sim-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;overflow-y:auto;padding:16px;}
.sim-modal-inner{background:white;border-radius:18px;padding:20px;max-width:500px;margin:auto;position:relative;}

/* 로그아웃 */
.btn-logout{width:100%;padding:12px;border-radius:12px;border:1.5px solid var(--red);background:white;
  color:var(--red);font-family:'Pretendard',sans-serif;font-size:0.88rem;font-weight:700;cursor:pointer;}

/* ── 탭바 ── */
.bottom-nav{
  position:fixed !important;bottom:0 !important;left:0 !important;right:0 !important;
  z-index:9999 !important;background:white !important;
  border-top:1px solid #e0e0f4 !important;display:flex !important;
  height:60px !important;box-shadow:0 -4px 20px rgba(30,30,114,0.08) !important;
  will-change:transform;-webkit-backface-visibility:hidden;backface-visibility:hidden;
  transform:translate3d(0,0,0);-webkit-transform:translate3d(0,0,0);
}
@supports (padding-bottom:env(safe-area-inset-bottom)){
  .bottom-nav{padding-bottom:env(safe-area-inset-bottom) !important;height:calc(60px + env(safe-area-inset-bottom)) !important;}
}
.nav-item{flex:1 !important;display:flex !important;flex-direction:column !important;
  align-items:center !important;justify-content:center !important;
  gap:3px !important;text-decoration:none !important;
  color:#bbbbdd !important;font-size:0.63rem !important;font-weight:700 !important;transition:color 0.15s;}
.nav-item svg{width:22px !important;height:22px !important;stroke:currentColor;fill:none;stroke-width:2;}
.nav-item.active{color:#2d2d9f !important;}
</style>
</head>

<div class="hero-band">
<div class="hero-band-inner">

  <!-- 앱 헤더 (중앙정렬, 관리자 버튼 우상단 절대배치) -->
  <div class="app-row">
    <a id="admin-btn" class="admin-btn" href="admin.html" title="관리자">⚙️</a>
    <div class="app-icon">
      <img src="icons/icon.png" alt="SuperSaver Kit">
    </div>

  </div>

  <div class="user-row">

      <div class="user-name"  id="user-name">로딩 중...</div>
      <div class="user-email" id="user-email"></div>
    </div>
    <div class="approved-badge">승인 완료</div>

</div>
</div>

<!-- ── 컨테이너 ── -->
<div class="container">

  <!-- 계정 정보 -->
  <div class="section">
    <div class="section-title">계정 정보</div>
    <div class="info-row">
      <span class="info-label">이메일</span>
      <span class="info-value" id="info-email">-</span>
    </div>
    <div class="info-row">
      <span class="info-label">가입 상태</span>
      <span class="badge-approved">승인 완료</span>
    </div>
  </div>

  <!-- 저장된 시뮬레이션 -->
  <div class="section" id="sim-section">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <div class="section-title" style="margin-bottom:0;">저장된 시뮬레이션</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:0.68rem;color:var(--text-sub);" id="sim-count"></span>
        <button class="btn-cmp-mode" id="btn-cmp-mode" onclick="toggleCompareMode()">비교 선택</button>
      </div>
    </div>
    <div id="sim-list">
      <div style="text-align:center;padding:20px;color:var(--text-sub);font-size:0.82rem;">불러오는 중...</div>
    </div>
  </div>

  <!-- 비교 플로팅 바 -->
  <div class="compare-bar" id="compare-bar">
    <div>
      <div style="font-size:0.82rem;font-weight:700;color:white;">📊 시뮬레이션 비교</div>
      <div style="font-size:0.68rem;color:rgba(255,255,255,0.6);margin-top:2px;" id="cmp-bar-count">0 / 2개 선택됨</div>
    </div>
    <div style="display:flex;align-items:center;gap:7px;">
      <button class="btn-do-compare" id="btn-do-cmp" onclick="doCompare()" disabled>비교하기</button>
      <button class="btn-bar-cancel" onclick="exitCompareMode()">✕</button>
    </div>
  </div>



</div>

<!-- ── 비교 결과 모달 ── -->
<div id="compare-modal">
  <div class="cmp-inner">
    <button class="cmp-close-btn" onclick="document.getElementById('compare-modal').style.display='none'">✕</button>
    <h3>📊 시뮬레이션 비교</h3>
    <div class="cmp-header">
      <div class="cmp-head-card cmp-head-a">

      <div id="cmp-inp-tbl"></div>
    </div>
    <div class="cmp-block">
      <div class="cmp-block-title">최종 결과</div>
      <div id="cmp-sum-tbl"></div>
    </div>
    <button onclick="document.getElementById('compare-modal').style.display='none'"
      style="width:100%;padding:11px;border-radius:10px;border:1.5px solid var(--border);background:white;color:var(--text-sub);font-family:'Pretendard',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;margin-top:4px;">닫기</button>
  </div>
</div>

<!-- ── 상세 모달 ── -->
<div id="sim-modal">

    </div>
    <div style="background:linear-gradient(135deg,#1e1e72,#2d2d9f);border-radius:10px;padding:12px;margin-bottom:12px;">
      <div style="font-size:0.65rem;font-weight:700;color:rgba(255,255,255,0.6);letter-spacing:0.08em;margin-bottom:8px;">최종 결과</div>
      <div id="modal-summary" style="display:grid;grid-template-columns:1fr 1fr;gap:7px;"></div>
    </div>
    <div style="font-size:0.65rem;font-weight:700;color:var(--text-sub);letter-spacing:0.08em;margin-bottom:6px;">주차별 데이터</div>
    <div style="overflow-x:auto;border-radius:8px;border:1px solid var(--border);">

      🗑 이 기록 삭제

</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, collection, query, where, getDocs, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const FB = {
  apiKey:"AIzaSyCV4elOllJXF-Rx6qrYNDAwSSfVHKAQelQ",
  authDomain:"supersaver-kit.firebaseapp.com",projectId:"supersaver-kit",
  storageBucket:"supersaver-kit.firebasestorage.app",
  messagingSenderId:"800388848026",appId:"1:800388848026:web:1d64b6ffebf8544ecb0223"
};
const app  = initializeApp(FB);
const auth = getAuth(app);
const db   = getFirestore(app);

window._simData     = {};
window._compareMode = false;
window._sel         = [];

onAuthStateChanged(auth, async (user) => {
  if (!user) { location.href='auth.html'; return; }
  const snap = await getDoc(doc(db,'users',user.uid));
  if (!snap.exists() || snap.data().status !== 'approved') {
    await signOut(auth); location.href='auth.html'; return;
  }
  const d = snap.data();
  const initial = (d.name||'?')[0].toUpperCase();
  document.getElementById('user-avatar').textContent = initial;
  document.getElementById('user-name').textContent   = d.name||'-';
  document.getElementById('user-email').textContent  = d.email||'-';
  document.getElementById('info-email').textContent  = d.email||'-';
  document.body.style.visibility = 'visible';
  window._auth = auth;
  if (d.role === 'admin') {
    const ab = document.getElementById('admin-btn');
    ab.style.display = 'flex';
  }
  sessionStorage.setItem('ssk_user', JSON.stringify({uid:user.uid,name:d.name,email:d.email,role:d.role||'user'}));
  loadSims(user.uid);
  fetchPrice();
});

window.doLogout = async () => {
  if (!confirm('로그아웃 하시겠습니까?')) return;
  await signOut(window._auth);
  location.href = 'auth.html';
};

/* ── SUT 시세 ── */
window.fetchPrice = async function() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  try {
    const r = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=supertrust&vs_currencies=usd,krw&include_24hr_change=true');
    const j = await r.json();
    const d = j.supertrust||j[Object.keys(j)[0]];
    if (!d) return;
    document.getElementById('chipPrice').textContent = '$' + d.usd.toFixed(4);
    document.getElementById('chipKrw').textContent   = '≈' + d.krw.toLocaleString('ko-KR') + '원';
    const ch = d.usd_24h_change||0;
    const el = document.getElementById('chipChange');
    el.textContent  = (ch>=0?'+':'')+ch.toFixed(2)+'%';
    el.className    = 'chip-change ' + (ch>0?'up':ch<0?'dn':'flat');
  } catch(e) {
    document.getElementById('chipPrice').textContent = '—';
  } finally {
    btn.classList.remove('spinning');
  }
};

/* ── 시뮬레이션 로드 ── */
async function loadSims(uid) {
  try {
    const q    = query(collection(db,'simulations'), where('userId','==',uid));
    const snap = await getDocs(q);
    const sims = snap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
    sims.forEach(s=>{ window._simData[s.id]=s; });
    document.getElementById('sim-count').textContent = `총 ${sims.length}건`;
    renderList(sims);
  } catch(e) {
    document.getElementById('sim-list').innerHTML =
      '<div style="text-align:center;padding:20px;color:var(--text-sub);font-size:0.8rem;">불러오기 실패. 새로고침해주세요.</div>';
  }
}

function renderList(sims) {
  const isCmp = window._compareMode;
  if (sims.length === 0) {
    document.getElementById('sim-list').innerHTML =
      '<div style="text-align:center;padding:20px;color:var(--text-sub);font-size:0.82rem;">저장된 시뮬레이션이 없습니다.<br>시뮬레이터에서 결과를 저장해보세요!</div>';
    return;
  }
  document.getElementById('sim-list').innerHTML = sims.map(s => {
    const dt  = s.createdAt ? new Date(s.createdAt.seconds*1000).toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'}) : '-';
    const inp = s.inputs||{};
    const chk = window._sel.includes(s.id);
    return `<div class="sim-item" onclick="${isCmp ? `toggleCheck('${s.id}')` : `showDetail('${s.id}')`}">
      <div class="sim-item-inner">
        ${isCmp ? `<div class="sim-check ${chk?'checked':''}" id="chk-${s.id}">
          <svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg></div>` : ''}
        <div style="flex:1;">
          <div style="font-size:0.88rem;font-weight:700;color:var(--indigo-deep);margin-bottom:3px;">${s.title||'제목 없음'}</div>
          <div style="font-size:0.68rem;color:var(--text-sub);margin-bottom:5px;">${dt}</div>
          <div style="display:flex;gap:5px;flex-wrap:wrap;">
            <span style="background:var(--indigo-lt);color:var(--indigo);font-size:0.62rem;font-weight:700;padding:2px 7px;border-radius:9px;">원금 ${inp.baseApproved||'-'} USDT</span>
            <span style="background:var(--mint-lt);color:var(--mint);font-size:0.62rem;font-weight:700;padding:2px 7px;border-radius:9px;">${inp.weeks||'-'}주</span>
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div style="font-size:0.65rem;color:var(--text-sub);">최종 신용대금</div>
          <div style="font-size:0.9rem;font-weight:900;color:var(--indigo-deep);">${(s.summary||{}).finalApproved||'-'}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

/* ── 비교 모드 ── */
window.toggleCompareMode = function() {
  window._compareMode = !window._compareMode;
  window._sel = [];
  const btn = document.getElementById('btn-cmp-mode');
  btn.textContent = window._compareMode ? '취소' : '비교 선택';
  btn.classList.toggle('on', window._compareMode);
  document.getElementById('compare-bar').classList.toggle('active', window._compareMode);
  refreshList(); updateBar();
};
window.exitCompareMode = function() {
  window._compareMode = false; window._sel = [];
  document.getElementById('btn-cmp-mode').textContent = '비교 선택';
  document.getElementById('btn-cmp-mode').classList.remove('on');
  document.getElementById('compare-bar').classList.remove('active');
  refreshList();
};
window.toggleCheck = function(id) {
  const sel = window._sel, idx = sel.indexOf(id);
  if (idx >= 0) { sel.splice(idx,1); }
  else {
    if (sel.length >= 2) { const old=sel.shift(); const el=document.getElementById('chk-'+old); if(el) el.classList.remove('checked'); }
    sel.push(id);
  }
  const el = document.getElementById('chk-'+id);
  if (el) el.classList.toggle('checked', sel.includes(id));
  updateBar();
};
function updateBar() {
  const n = window._sel.length;
  document.getElementById('cmp-bar-count').textContent = `${n} / 2개 선택됨`;
  document.getElementById('btn-do-cmp').disabled = (n !== 2);
}
function refreshList() {
  const sims = Object.values(window._simData).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  renderList(sims);
}

/* ── 비교 실행 ── */
window.doCompare = function() {
  const [idA,idB] = window._sel;
  const a = window._simData[idA], b = window._simData[idB];
  if (!a||!b) return;
  const fdt = s => s.createdAt ? new Date(s.createdAt.seconds*1000).toLocaleDateString('ko-KR',{month:'short',day:'numeric'}) : '-';
  document.getElementById('cmp-title-a').textContent = a.title||'제목 없음';
  document.getElementById('cmp-title-b').textContent = b.title||'제목 없음';
  document.getElementById('cmp-date-a').textContent  = fdt(a);
  document.getElementById('cmp-date-b').textContent  = fdt(b);
  const p = v => parseFloat((v||'').toString().replace(/[^0-9.\-]/g,''))||0;
  const inpRows = [
    ['원금 (신용대금)', s=>(s.inputs?.baseApproved||'-')+' USDT', null],
    ['일 지급금',      s=>(s.inputs?.baseDaily||'-')+' USDT',     null],
    ['기간',           s=>(s.inputs?.weeks||'-')+'주',             (a,b)=>p(a.inputs?.weeks)-p(b.inputs?.weeks)],
    ['CR 가격',        s=>(s.inputs?.creditPrice||'-')+' USDT',   null],
    ['SUT 가격',       s=>(s.inputs?.sutPrice||'-')+' USDT',      null],
    ['SUT 변화율',     s=>(s.inputs?.sutChangeRate||'-')+'%',     null],
    ['CR 변화율',      s=>(s.inputs?.crChangeRate||'-')+'%',      null],
  ];
  const sumRows = [
    ['최종 신용대금', s=>(s.summary?.finalApproved||'-'), (a,b)=>p(a.summary?.finalApproved)-p(b.summary?.finalApproved)],
    ['일 지급금',     s=>(s.summary?.finalDaily||'-'),    (a,b)=>p(a.summary?.finalDaily)-p(b.summary?.finalDaily)],
    ['주 지급금',     s=>(s.summary?.finalWeekly||'-'),   (a,b)=>p(a.summary?.finalWeekly)-p(b.summary?.finalWeekly)],
    ['총 주정산',     s=>(s.summary?.totalWeekly||'-'),   (a,b)=>p(a.summary?.totalWeekly)-p(b.summary?.totalWeekly)],
    ['총 재참여',     s=>(s.summary?.totalContract||'-'), (a,b)=>p(a.summary?.totalContract)-p(b.summary?.totalContract)],
    ['총 2단계비용',  s=>(s.summary?.totalCost||'-'),     (a,b)=>p(b.summary?.totalCost)-p(a.summary?.totalCost)],
  ];
  document.getElementById('cmp-inp-tbl').innerHTML = buildTbl(a,b,inpRows);
  document.getElementById('cmp-sum-tbl').innerHTML = buildTbl(a,b,sumRows);
  document.getElementById('compare-modal').style.display = 'block';
  document.getElementById('compare-modal').scrollTop = 0;
};
function buildTbl(a,b,rows) {
  return rows.map(([lbl,fn,diffFn])=>{
    const va=fn(a), vb=fn(b); let ba='', bb='';
    if (diffFn) { const d=diffFn(a,b); if(d>0) ba='<span class="win-badge win-a">▲</span>'; else if(d<0) bb='<span class="win-badge win-b">▲</span>'; }
    return `<div class="cmp-row"><div class="cmp-cell cmp-lbl">${lbl}</div><div class="cmp-cell cmp-a">${va}${ba}</div><div class="cmp-cell cmp-b">${vb}${bb}</div></div>`;
  }).join('');
}

/* ── 상세 모달 ── */
window.showDetail = function(id) {
  const s = window._simData[id]; if (!s) return;
  window._currentSimId = id;
  document.getElementById('modal-title').textContent = s.title||'제목 없음';
  const dt = s.createdAt ? new Date(s.createdAt.seconds*1000).toLocaleString('ko-KR') : '-';
  document.getElementById('modal-date').textContent = `저장일시: ${dt}`;
  const inp = s.inputs||{};
  document.getElementById('modal-inputs').innerHTML = [
    ['원금(신용대금)',inp.baseApproved+' USDT'],['일지급금',inp.baseDaily+' USDT'],
    ['기간',inp.weeks+'주'],['CR가격',inp.creditPrice+' USDT'],
    ['SUT가격',inp.sutPrice+' USDT'],['SUT변화율',inp.sutChangeRate+'%'],['CR변화율',inp.crChangeRate+'%'],
  ].map(([k,v])=>`<div><div style="font-size:0.62rem;color:var(--text-sub);margin-bottom:2px;">${k}</div><div style="font-size:0.8rem;font-weight:700;color:var(--indigo-deep);">${v}</div></div>`).join('');
  const sum=s.summary||{};
  document.getElementById('modal-summary').innerHTML = [
    ['최종 신용대금',sum.finalApproved],['일 지급금',sum.finalDaily],
    ['주 지급금',sum.finalWeekly],['총 주정산',sum.totalWeekly],
    ['총 재참여',sum.totalContract],['총 2단계비용',sum.totalCost],
  ].map(([k,v])=>`<div><div style="font-size:0.62rem;color:rgba(255,255,255,0.6);margin-bottom:2px;">${k}</div><div style="font-size:0.8rem;font-weight:700;color:white;">${v||'-'}</div></div>`).join('');
  document.getElementById('modal-weekly').innerHTML = (s.weeklyData||[]).map(w=>
    `<tr style="border-bottom:1px solid var(--border);">
      <td style="padding:5px 4px;text-align:center;font-weight:700;color:var(--text-sub);">${w.week}</td>
      <td style="padding:5px 4px;text-align:right;color:var(--indigo-deep);">${w.date}</td>
      <td style="padding:5px 4px;text-align:right;color:var(--mint);">${w.contract||'-'}</td>
      <td style="padding:5px 4px;text-align:right;color:var(--indigo);">${w.daily||'-'}</td>
      <td style="padding:5px 4px;text-align:right;color:var(--indigo-deep);">${w.approved||'-'}</td>
    </tr>`).join('');
  document.getElementById('sim-modal').style.display='block';
  document.getElementById('sim-modal').scrollTop=0;
};

window.deleteSimulation = async function(id) {
  if (!confirm('이 시뮬레이션 기록을 삭제하시겠습니까?')) return;
  try {
    await deleteDoc(doc(db,'simulations',id));
    document.getElementById('sim-modal').style.display='none';
    delete window._simData[id];
    document.getElementById('sim-count').textContent = `총 ${Object.keys(window._simData).length}건`;
    refreshList();
  } catch(e) { alert('삭제 중 오류가 발생했습니다.'); }
};
</script>

<script>
/* iPad Chrome position:fixed 버그 대응 */
(function(){
  var nav = null;
  function fixNav(){
    if(!nav) nav = document.querySelector('.bottom-nav');
    if(!nav) return;
    nav.style.position = 'fixed';
    nav.style.bottom   = '0px';
  }
  window.addEventListener('scroll',    fixNav, {passive:true});
  window.addEventListener('touchmove', fixNav, {passive:true});
  window.addEventListener('touchend',  fixNav, {passive:true});
  document.addEventListener('DOMContentLoaded', fixNav);
})();
</script>
