<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SuperSaver Kit">
<meta name="theme-color" content="#1e1e72">
<title>SuperSaver Kit</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
:root {
  --indigo-deep: #1e1e72;
  --indigo:      #2d2d9f;
  --indigo-mid:  #3d3dbb;
  --indigo-lt:   #f0f0ff;
  --indigo-bg:   #f4f4ff;
  --gold:        #FFD700;
  --gold-lt:     rgba(255,215,0,0.18);
  --border:      #e0e0f4;
  --text-main:   #1e1e72;
  --text-sub:    #8888bb;
  --white:       #ffffff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Pretendard', sans-serif;
  background: var(--indigo-bg);
  color: var(--text-main);
  padding-bottom: 68px;
  overflow-x: hidden;
  -webkit-text-size-adjust: none;
}

/* ── 히어로 ── */
.hero {
  min-height: 100svh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 0 24px 20px;
  background: linear-gradient(160deg, #1e1e72 0%, #2d2d9f 55%, #1e1e72 100%);
  position: relative; overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.025) 40px),
              repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.025) 40px);
  pointer-events: none;
}

/* ── 로고 ── */
.logo-wrap {
  width: 96px; height: 96px; border-radius: 24px;
  background: white;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 20px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.1);
  position: relative; z-index: 1;
}
.logo-wrap img { width: 68px; height: 68px; object-fit: contain; }
.live-dot {
  position: absolute; top: 8px; right: 8px;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 0 3px rgba(255,215,0,0.25);
  animation: pulse 2.2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.7;transform:scale(1.25)} }

/* ── 텍스트 ── */
.app-name {
  font-size: clamp(1.6rem, 5.5vw, 2.2rem); font-weight: 900;
  color: white; letter-spacing: -0.03em; text-align: center;
  margin-bottom: 4px; position: relative; z-index: 1;
}
.app-tagline {
  font-size: 0.75rem; font-weight: 600; color: rgba(255,255,255,0.45);
  letter-spacing: 0.14em; text-transform: uppercase;
  text-align: center; margin-bottom: 24px; position: relative; z-index: 1;
}

/* ── 시세 칩 ── */
.price-chip {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--gold-lt); border: 1px solid rgba(255,215,0,0.4);
  border-radius: 32px; padding: 8px 18px; margin-bottom: 32px;
  position: relative; z-index: 1;
}
.chip-label { font-size: 0.65rem; font-weight: 700; color: rgba(255,215,0,0.7); letter-spacing: 0.1em; }
.chip-price { font-size: 1.05rem; font-weight: 900; color: var(--gold); }
.chip-krw   { font-size: 0.72rem; font-weight: 600; color: rgba(255,255,255,0.45); }
.chip-change { font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
.chip-change.up { background: rgba(46,125,50,0.3); color: #a5d6a7; }
.chip-change.dn { background: rgba(198,40,40,0.3); color: #ef9a9a; }
.chip-change.flat { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.45); }
.refresh-chip { background: none; border: none; color: rgba(255,255,255,0.35); cursor: pointer; font-size: 0.95rem; padding: 0; line-height: 1; }
.refresh-chip.spinning { animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── 기능 카드 (1열 3행) ── */
.cards { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 420px; position: relative; z-index: 1; }
.card {
  background: white; border: 1px solid var(--border);
  border-left: 4px solid var(--indigo);
  border-radius: 16px; padding: 16px 18px;
  display: flex; align-items: center; gap: 14px;
  text-decoration: none; color: var(--text-main);
  box-shadow: 0 2px 12px rgba(30,30,114,0.08);
  transition: transform 0.15s, box-shadow 0.15s;
}
.card:active { transform: scale(0.98); box-shadow: 0 1px 6px rgba(30,30,114,0.06); }
.card-icon-wrap {
  width: 44px; height: 44px; border-radius: 12px;
  background: var(--indigo-lt); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.card-icon-wrap svg { width: 22px; height: 22px; stroke: var(--indigo); fill: none; stroke-width: 2; }
.card-text { flex: 1; }
.card-name { font-size: 0.95rem; font-weight: 800; color: var(--indigo-deep); margin-bottom: 3px; }
.card-desc { font-size: 0.72rem; color: var(--text-sub); line-height: 1.4; }
.card-arrow { font-size: 1.2rem; color: var(--indigo-mid); font-weight: 300; }

/* ── 하단 탭바 ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 999;
  background: white; border-top: 1px solid var(--border);
  display: flex; height: 60px;
  box-shadow: 0 -4px 20px rgba(30,30,114,0.08);
}
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  .bottom-nav { padding-bottom: env(safe-area-inset-bottom); height: calc(60px + env(safe-area-inset-bottom)); }
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; text-decoration: none; color: #bbbbdd; font-size: 0.63rem; font-weight: 700;
  transition: color 0.15s;
}
.nav-item svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; }
.nav-item.active { color: var(--indigo); }
</style>
</head>

<script>
async function fetchPrice() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  try {
    const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=super-trust&vs_currencies=usd,krw&include_24hr_change=true', { signal: AbortSignal.timeout(8000) });
    const data = await res.json();
    const d = data['super-trust'];
    if (!d) throw new Error();
    const c = d.usd_24h_change ?? 0;
    const cls = c > 0 ? 'up' : c < 0 ? 'dn' : 'flat';
    document.getElementById('chipPrice').textContent = d.usd.toFixed(4) + ' USDT';
    document.getElementById('chipKrw').textContent = '₩' + Math.round(d.krw).toLocaleString('ko-KR');
    const cc = document.getElementById('chipChange');
    cc.textContent = (c > 0 ? '+' : '') + c.toFixed(2) + '%';
    cc.className = 'chip-change ' + cls;
  } catch(e) {
    document.getElementById('chipPrice').textContent = '조회 실패';
  } finally { btn.classList.remove('spinning'); }
}
fetchPrice();
setInterval(fetchPrice, 5 * 60 * 1000);
</script>
