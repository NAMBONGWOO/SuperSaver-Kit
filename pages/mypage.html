<!DOCTYPE html>
<html lang="ko">
<head>
<link rel="icon" type="image/png" sizes="192x192" href="../icons/icon-192x192.png">
<link rel="apple-touch-icon" sizes="180x180" href="../icons/icon-180x180.png">
<link rel="manifest" href="../manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1e1e72">
<title>SuperSaver Kit — 내 정보</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
:root{--indigo-deep:#1e1e72;--indigo:#2d2d9f;--indigo-lt:#f0f0ff;--indigo-bg:#f4f4ff;--mint:#00938a;--mint-lt:#e0f5f4;--gold-muted:#c9a84c;--gold-lt:#fdf3dc;--border:#e0e0f4;--gray-lt:#f4f7f9;--text-sub:#8888bb;--red:#d93025;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard',sans-serif;background:var(--indigo-bg);padding-bottom:80px;visibility:hidden;}
.hero{background:linear-gradient(160deg,#1e1e72 0%,#2d2d9f 55%,#1e1e72 100%);color:white;padding:40px 24px 32px;text-align:center;}
.hero-avatar{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:1.6rem;font-weight:900;margin:0 auto 12px;border:2px solid rgba(255,255,255,0.3);}
.hero-name{font-size:1.2rem;font-weight:900;letter-spacing:-0.02em;}
.hero-email{font-size:0.78rem;color:rgba(255,255,255,0.6);margin-top:4px;}
.hero-badge{display:inline-block;background:rgba(255,215,0,0.2);color:#FFD700;border:1px solid rgba(255,215,0,0.35);font-size:0.65rem;font-weight:700;padding:3px 10px;border-radius:20px;margin-top:8px;letter-spacing:0.05em;}
.container{max-width:860px;margin:0 auto;padding:20px 16px;}
.section{background:white;border-radius:20px;padding:24px;margin-bottom:12px;border:1px solid var(--border);box-shadow:0 2px 12px rgba(30,30,114,0.06);}
.section-title{font-size:0.78rem;font-weight:700;color:var(--text-sub);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:16px;}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.info-row:last-child{border-bottom:none;padding-bottom:0;}
.info-label{font-size:0.82rem;color:var(--text-sub);font-weight:500;}
.info-value{font-size:0.88rem;color:var(--indigo-deep);font-weight:700;}
.status-badge{display:inline-block;font-size:0.68rem;font-weight:700;padding:3px 10px;border-radius:20px;}
.badge-approved{background:var(--mint-lt);color:var(--mint);}
.menu-item{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer;text-decoration:none;}
.menu-item:last-child{border-bottom:none;}
.menu-icon{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
.menu-text{flex:1;}
.menu-name{font-size:0.9rem;font-weight:700;color:var(--indigo-deep);}
.menu-sub{font-size:0.72rem;color:var(--text-sub);margin-top:2px;}
.menu-arr{color:var(--text-sub);font-size:1.1rem;}
.btn-logout{width:100%;padding:14px;border-radius:14px;border:1.5px solid var(--red);background:white;color:var(--red);font-family:'Pretendard',sans-serif;font-size:0.92rem;font-weight:700;cursor:pointer;transition:all 0.15s;margin-top:4px;}
.btn-logout:hover{background:#ffebee;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:9999;background:white;border-top:1px solid var(--border);display:flex;height:60px;box-shadow:0 -4px 20px rgba(30,30,114,0.08);}
@supports (padding-bottom:env(safe-area-inset-bottom)){.bottom-nav{padding-bottom:env(safe-area-inset-bottom);height:calc(60px + env(safe-area-inset-bottom));}}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;text-decoration:none;color:#bbbbdd;font-size:0.63rem;font-weight:700;transition:color 0.15s;}
.nav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;}
.nav-item.active{color:var(--indigo);}
</style>
</head>
<body>

<div class="hero" id="hero">
  <div style="position:relative; display:inline-block;">
    <div class="hero-avatar" id="hero-avatar">?</div>
  </div>
  <div class="hero-name" id="hero-name">로딩 중...</div>
  <div class="hero-email" id="hero-email"></div>
  <div style="display:flex; align-items:center; justify-content:center; gap:8px; margin-top:8px;">
    <div class="hero-badge" id="hero-badge">승인 완료</div>
    <a id="admin-link" href="../admin.html" style="display:none; background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.25); border-radius:20px; padding:3px 10px; font-size:0.9rem; text-decoration:none;" title="관리자 페이지">⚙️</a>
  </div>
</div>

<div class="container">

  <div class="section">
    <div class="section-title">계정 정보</div>
    <div class="info-row">
      <span class="info-label">이름</span>
      <span class="info-value" id="info-name">-</span>
    </div>
    <div class="info-row">
      <span class="info-label">이메일</span>
      <span class="info-value" id="info-email">-</span>
    </div>
    <div class="info-row">
      <span class="info-label">가입 상태</span>
      <span class="status-badge badge-approved">승인 완료</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">메뉴</div>
    <a class="menu-item" href="simulator.html">
      <div class="menu-icon" style="background:var(--indigo-lt);">📊</div>
      <div class="menu-text">
        <div class="menu-name">시뮬레이터</div>
        <div class="menu-sub">새 시뮬레이션 실행</div>
      </div>
      <div class="menu-arr">›</div>
    </a>
    <a class="menu-item" href="../pages/guide_home.html">
      <div class="menu-icon" style="background:var(--mint-lt);">📚</div>
      <div class="menu-text">
        <div class="menu-name">가이드 센터</div>
        <div class="menu-sub">학습 자료 모음</div>
      </div>
      <div class="menu-arr">›</div>
    </a>
  </div>

  <!-- 시뮬레이션 기록 -->
  <div class="section" id="sim-section">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
      <div class="section-title" style="margin-bottom:0;">저장된 시뮬레이션</div>
      <span style="font-size:0.72rem; color:var(--text-sub);" id="sim-count"></span>
    </div>
    <div id="sim-list"><div style="text-align:center; padding:20px; color:var(--text-sub); font-size:0.85rem;">불러오는 중...</div></div>
  </div>

  <!-- 시뮬레이션 상세 모달 -->
  <div id="sim-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:9999; overflow-y:auto; padding:20px;">
    <div style="background:white; border-radius:20px; padding:24px; max-width:500px; margin:auto; position:relative;">
      <button onclick="document.getElementById('sim-modal').style.display='none'"
        style="position:absolute; top:16px; right:16px; background:var(--gray-lt); border:none;
               width:30px; height:30px; border-radius:50%; font-size:1.1rem; cursor:pointer; display:flex; align-items:center; justify-content:center;">✕</button>
      <h3 style="font-size:1.0rem; font-weight:900; color:var(--indigo-deep); margin-bottom:4px;" id="modal-title"></h3>
      <p style="font-size:0.72rem; color:var(--text-sub); margin-bottom:20px;" id="modal-date"></p>

      <!-- 입력값 -->
      <div style="background:var(--indigo-lt); border-radius:12px; padding:14px; margin-bottom:14px;">
        <div style="font-size:0.7rem; font-weight:700; color:var(--text-sub); letter-spacing:0.08em; margin-bottom:10px;">입력값</div>
        <div id="modal-inputs" style="display:grid; grid-template-columns:1fr 1fr; gap:8px;"></div>
      </div>

      <!-- 요약 결과 -->
      <div style="background:linear-gradient(135deg,#1e1e72,#2d2d9f); border-radius:12px; padding:14px; margin-bottom:14px;">
        <div style="font-size:0.7rem; font-weight:700; color:rgba(255,255,255,0.6); letter-spacing:0.08em; margin-bottom:10px;">최종 결과</div>
        <div id="modal-summary" style="display:grid; grid-template-columns:1fr 1fr; gap:8px;"></div>
      </div>

      <!-- 주차별 데이터 -->
      <div style="font-size:0.7rem; font-weight:700; color:var(--text-sub); letter-spacing:0.08em; margin-bottom:8px;">주차별 데이터</div>
      <div style="overflow-x:auto; border-radius:10px; border:1px solid var(--border);">
        <table style="width:100%; border-collapse:collapse; font-size:0.75rem; min-width:400px;">
          <thead>
            <tr style="background:linear-gradient(135deg,#1e1e72,#2d2d9f);">
              <th style="padding:8px; color:white; text-align:center; font-weight:700;">주차</th>
              <th style="padding:8px; color:white; text-align:right; font-weight:700;">날짜</th>
              <th style="padding:8px; color:white; text-align:right; font-weight:700;">계약</th>
              <th style="padding:8px; color:white; text-align:right; font-weight:700;">일수익</th>
              <th style="padding:8px; color:white; text-align:right; font-weight:700;">가용</th>
            </tr>
          </thead>
          <tbody id="modal-weekly"></tbody>
        </table>
      </div>

      <button onclick="deleteSimulation(window._currentSimId)"
        style="width:100%; margin-top:16px; padding:12px; border-radius:10px;
               border:1.5px solid var(--red); background:white; color:var(--red);
               font-family:'Pretendard',sans-serif; font-size:0.85rem; font-weight:700; cursor:pointer;">
        🗑 이 기록 삭제
      </button>
    </div>
  </div>

  <div class="section">
    <button class="btn-logout" onclick="doLogout()">로그아웃</button>
  </div>

</div>

<nav class="bottom-nav">
  <a class="nav-item" href="../index.html">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>홈
  </a>
  <a class="nav-item" href="guide_home.html">
    <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>가이드
  </a>
  <a class="nav-item" href="calculator.html">
    <svg viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="10" y2="10"/><line x1="14" y1="10" x2="16" y2="10"/></svg>계산기
  </a>
  <a class="nav-item" href="simulator.html">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>시뮬레이터
  </a>
  <a class="nav-item active" href="mypage.html">
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>내 정보
  </a>
</nav>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp({
  apiKey:"AIzaSyCV4elOllJXF-Rx6qrYNDAwSSfVHKAQelQ",
  authDomain:"supersaver-kit.firebaseapp.com",
  projectId:"supersaver-kit",
  storageBucket:"supersaver-kit.firebasestorage.app",
  messagingSenderId:"800388848026",
  appId:"1:800388848026:web:1d64b6ffebf8544ecb0223"
});
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href='../auth.html'; return; }
  const snap = await getDoc(doc(db,'users',user.uid));
  if (!snap.exists() || snap.data().status !== 'approved') {
    await signOut(auth); window.location.href='../auth.html'; return;
  }
  const data = snap.data();
  const initial = (data.name||'?')[0].toUpperCase();
  document.getElementById('hero-avatar').textContent = initial;
  document.getElementById('hero-name').textContent = data.name||'-';
  document.getElementById('hero-email').textContent = data.email||'-';
  document.getElementById('info-name').textContent = data.name||'-';
  document.getElementById('info-email').textContent = data.email||'-';
  document.body.style.visibility = 'visible';
  window._auth = auth;
  if (data.role === 'admin') {
    document.getElementById('admin-link').style.display = 'inline-block';
  }
  loadSimulations(user.uid);
});

window.doLogout = async function() {
  if (!confirm('로그아웃 하시겠습니까?')) return;
  await signOut(window._auth);
  window.location.href = '../auth.html';
};

// 시뮬레이션 기록 로드
async function loadSimulations(uid) {
  try {
    const { initializeApp, getApps } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const { getFirestore, collection, query, where, getDocs, doc, deleteDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const app = getApps().length ? getApps()[0] : initializeApp({
      apiKey:"AIzaSyCV4elOllJXF-Rx6qrYNDAwSSfVHKAQelQ",
      authDomain:"supersaver-kit.firebaseapp.com",
      projectId:"supersaver-kit",
      storageBucket:"supersaver-kit.firebasestorage.app",
      messagingSenderId:"800388848026",
      appId:"1:800388848026:web:1d64b6ffebf8544ecb0223"
    });
    const db = getFirestore(app);
    window._db = db;
    window._deleteDoc = deleteDoc;
    window._doc = doc;

    // orderBy 제거 → 인덱스 불필요, JS에서 정렬
    const q = query(collection(db,'simulations'), where('userId','==',uid));
    const snap = await getDocs(q);
    const sims = snap.docs.map(d => ({id:d.id,...d.data()}))
      .sort((a,b) => {
        const ta = a.createdAt?.seconds || 0;
        const tb = b.createdAt?.seconds || 0;
        return tb - ta; // 최신순
      });

    const listEl = document.getElementById('sim-list');
    document.getElementById('sim-count').textContent = `총 ${sims.length}건`;

    if (sims.length === 0) {
      listEl.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text-sub);font-size:0.85rem;">저장된 시뮬레이션이 없습니다.<br>시뮬레이터에서 결과를 저장해보세요!</div>';
      return;
    }

    listEl.innerHTML = sims.map(s => {
      const dt = s.createdAt ? new Date(s.createdAt.seconds*1000).toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'}) : '-';
      const inp = s.inputs || {};
      return `<div style="padding:14px 0; border-bottom:1px solid var(--border); cursor:pointer;" onclick="showSimDetail('${s.id}')">
        <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:10px;">
          <div style="flex:1;">
            <div style="font-size:0.9rem; font-weight:700; color:var(--indigo-deep); margin-bottom:4px;">${s.title||'제목 없음'}</div>
            <div style="font-size:0.72rem; color:var(--text-sub); margin-bottom:6px;">${dt}</div>
            <div style="display:flex; gap:6px; flex-wrap:wrap;">
              <span style="background:var(--indigo-lt);color:var(--indigo);font-size:0.65rem;font-weight:700;padding:2px 8px;border-radius:10px;">원금 ${inp.baseApproved||'-'} USDT</span>
              <span style="background:var(--mint-lt);color:var(--mint-dk);font-size:0.65rem;font-weight:700;padding:2px 8px;border-radius:10px;">${inp.weeks||'-'}주</span>
            </div>
          </div>
          <div style="text-align:right; flex-shrink:0;">
            <div style="font-size:0.72rem; color:var(--text-sub);">최종 가용</div>
            <div style="font-size:0.95rem; font-weight:900; color:var(--indigo-deep);">${(s.summary||{}).finalApproved||'-'}</div>
          </div>
        </div>
      </div>`;
    }).join('');

    // 클릭용 데이터 저장
    window._simData = {};
    sims.forEach(s => { window._simData[s.id] = s; });

  } catch(e) {
    console.error(e);
    document.getElementById('sim-list').innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-sub);font-size:0.82rem;">불러오기 실패. 새로고침해주세요.</div>';
  }
}

window.showSimDetail = function(id) {
  const s = window._simData[id];
  if (!s) return;
  window._currentSimId = id;

  document.getElementById('modal-title').textContent = s.title || '제목 없음';
  const dt = s.createdAt ? new Date(s.createdAt.seconds*1000).toLocaleString('ko-KR') : '-';
  document.getElementById('modal-date').textContent = `저장일시: ${dt}`;

  // 입력값
  const inp = s.inputs || {};
  const inputItems = [
    ['원금(가용)', inp.baseApproved+' USDT'],
    ['일수익', inp.baseDaily+' USDT'],
    ['기간', inp.weeks+'주'],
    ['CR가격', inp.creditPrice+' USDT'],
    ['SUT가격', inp.sutPrice+' USDT'],
    ['SUT변화율', inp.sutChangeRate+'%'],
    ['CR변화율', inp.crChangeRate+'%'],
  ];
  document.getElementById('modal-inputs').innerHTML = inputItems.map(([k,v]) =>
    `<div><div style="font-size:0.65rem;color:var(--text-sub);margin-bottom:2px;">${k}</div><div style="font-size:0.82rem;font-weight:700;color:var(--indigo-deep);">${v}</div></div>`
  ).join('');

  // 요약 결과
  const sum = s.summary || {};
  const sumItems = [
    ['최종 가용', sum.finalApproved],
    ['일 수익', sum.finalDaily],
    ['주 수익', sum.finalWeekly],
    ['총 주정산', sum.totalWeekly],
    ['총 계약', sum.totalContract],
    ['총 2단계비용', sum.totalCost],
  ];
  document.getElementById('modal-summary').innerHTML = sumItems.map(([k,v]) =>
    `<div><div style="font-size:0.65rem;color:rgba(255,255,255,0.6);margin-bottom:2px;">${k}</div><div style="font-size:0.82rem;font-weight:700;color:white;">${v||'-'}</div></div>`
  ).join('');

  // 주차별 데이터
  const weekly = s.weeklyData || [];
  document.getElementById('modal-weekly').innerHTML = weekly.map(w =>
    `<tr style="border-bottom:1px solid var(--border);">
      <td style="padding:7px 8px; text-align:center; font-weight:700; color:var(--text-sub);">${w.week}</td>
      <td style="padding:7px 8px; text-align:right; color:var(--indigo-deep);">${w.date}</td>
      <td style="padding:7px 8px; text-align:right; color:var(--mint);">${w.contract||'-'}</td>
      <td style="padding:7px 8px; text-align:right; color:var(--indigo);">${w.daily||'-'}</td>
      <td style="padding:7px 8px; text-align:right; color:var(--indigo-deep);">${w.approved||'-'}</td>
    </tr>`
  ).join('');

  document.getElementById('sim-modal').style.display = 'block';
  document.getElementById('sim-modal').scrollTop = 0;
}

window.deleteSimulation = async function(id) {
  if (!confirm('이 시뮬레이션 기록을 삭제하시겠습니까?')) return;
  try {
    await window._deleteDoc(window._doc(window._db,'simulations',id));
    document.getElementById('sim-modal').style.display = 'none';
    const user = JSON.parse(sessionStorage.getItem('ssk_user')||'null');
    if (user) loadSimulations(user.uid);
  } catch(e) { alert('삭제 중 오류가 발생했습니다.'); }
}

</script>
</body>
</html>
