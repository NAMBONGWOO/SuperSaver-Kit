<style>
:root{
  --indigo-deep:#1e1e72;--indigo:#2d2d9f;--indigo-lt:#f0f0ff;--indigo-bg:#f4f4ff;
  --mint:#00938a;--mint-lt:#e0f5f4;--gold:#FFD700;
  --border:#e0e0f4;--gray-lt:#f4f7f9;--text-sub:#8888bb;--red:#d93025;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard',sans-serif;background:var(--indigo-bg);padding-bottom:80px;visibility:hidden;}
.hero{background:linear-gradient(160deg,#1e1e72 0%,#2d2d9f 55%,#1e1e72 100%);color:white;padding:18px 24px 16px;display:flex;align-items:center;gap:14px;}
.hero-avatar{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:900;flex-shrink:0;border:2px solid rgba(255,255,255,0.3);}
.hero-name{font-size:1.0rem;font-weight:900;letter-spacing:-0.02em;}
.hero-email{font-size:0.75rem;color:rgba(255,255,255,0.6);margin-top:2px;}
.container{max-width:860px;margin:0 auto;padding:20px 16px;}
.section{background:white;border-radius:20px;padding:24px;margin-bottom:12px;border:1px solid var(--border);box-shadow:0 2px 12px rgba(30,30,114,0.06);}
.section-title{font-size:0.78rem;font-weight:700;color:var(--text-sub);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:16px;}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.info-row:last-child{border-bottom:none;padding-bottom:0;}
.info-label{font-size:0.82rem;color:var(--text-sub);font-weight:500;}
.info-value{font-size:0.88rem;color:var(--indigo-deep);font-weight:700;}
.status-badge{display:inline-block;font-size:0.68rem;font-weight:700;padding:3px 10px;border-radius:20px;}
.badge-approved{background:var(--mint-lt);color:var(--mint);}
.btn-logout{width:100%;padding:14px;border-radius:14px;border:1.5px solid var(--red);background:white;color:var(--red);font-family:'Pretendard',sans-serif;font-size:0.92rem;font-weight:700;cursor:pointer;transition:all 0.15s;margin-top:4px;}
.btn-logout:hover{background:#ffebee;}

/* 시뮬레이션 아이템 */
.sim-item{padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.sim-item:last-child{border-bottom:none;}
.sim-item-inner{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.sim-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);background:white;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:all 0.15s;}
.sim-check.checked{border-color:var(--indigo);background:var(--indigo);}
.sim-check svg{display:none;width:12px;height:12px;stroke:white;stroke-width:3;fill:none;}
.sim-check.checked svg{display:block;}

/* 비교 모드 토글 버튼 */
.btn-compare-mode{font-size:0.72rem;font-weight:700;padding:5px 12px;border-radius:20px;border:1.5px solid var(--indigo);background:white;color:var(--indigo);font-family:'Pretendard',sans-serif;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.btn-compare-mode.on{background:var(--indigo);color:white;}

/* 비교 플로팅 바 */
.compare-bar{
  position:sticky;bottom:68px;left:0;right:0;z-index:100;
  background:var(--indigo);border-radius:16px;margin:0 0 12px;
  padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;
  box-shadow:0 8px 24px rgba(30,30,114,0.35);
  transition:opacity 0.2s,transform 0.2s;
  opacity:0;transform:translateY(10px);pointer-events:none;
}
.compare-bar.active{opacity:1;transform:translateY(0);pointer-events:all;}
.btn-do-compare{padding:9px 18px;background:var(--gold);color:var(--indigo-deep);border:none;border-radius:10px;font-family:'Pretendard',sans-serif;font-size:0.82rem;font-weight:900;cursor:pointer;white-space:nowrap;}
.btn-do-compare:disabled{background:rgba(255,255,255,0.2);color:rgba(255,255,255,0.4);cursor:default;}
.btn-bar-cancel{background:none;border:none;color:rgba(255,255,255,0.5);font-size:1.2rem;cursor:pointer;padding:0 4px;line-height:1;}

/* 비교 결과 모달 */
#compare-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9999;overflow-y:auto;padding:16px;}
.cmp-inner{background:white;border-radius:20px;padding:20px;max-width:640px;margin:0 auto;position:relative;}
.cmp-inner h3{font-size:1.0rem;font-weight:900;color:var(--indigo-deep);margin-bottom:16px;text-align:center;}
.cmp-close-btn{position:absolute;top:16px;right:16px;background:var(--gray-lt);border:none;width:30px;height:30px;border-radius:50%;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cmp-header{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.cmp-head-card{border-radius:12px;padding:12px;text-align:center;}
.cmp-head-a{background:linear-gradient(135deg,#1e1e72,#2d2d9f);}
.cmp-head-b{background:linear-gradient(135deg,#00938a,#00bdb0);}
.cmp-head-label{font-size:0.6rem;font-weight:700;letter-spacing:0.1em;margin-bottom:4px;opacity:0.7;color:white;}
.cmp-head-title{font-size:0.82rem;font-weight:900;color:white;line-height:1.3;word-break:keep-all;}
.cmp-head-date{font-size:0.65rem;color:rgba(255,255,255,0.6);margin-top:3px;}
.cmp-block{margin-bottom:14px;}
.cmp-block-title{font-size:0.7rem;font-weight:700;color:var(--text-sub);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;border-left:3px solid var(--indigo);padding-left:8px;}
.cmp-row{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--border);}
.cmp-row:last-child{border-bottom:none;}
.cmp-cell{padding:9px 10px;font-size:0.78rem;}
.cmp-lbl{color:var(--text-sub);font-weight:500;font-size:0.73rem;background:var(--gray-lt);}
.cmp-a{color:var(--indigo-deep);font-weight:700;text-align:right;}
.cmp-b{color:var(--mint);font-weight:700;text-align:right;}
.win-badge{font-size:0.6rem;font-weight:700;padding:1px 5px;border-radius:6px;margin-left:3px;vertical-align:middle;}
.win-a{background:rgba(30,30,114,0.1);color:var(--indigo);}
.win-b{background:rgba(0,147,138,0.12);color:var(--mint);}

/* 상세 모달 */
#sim-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;overflow-y:auto;padding:20px;}
.sim-modal-inner{background:white;border-radius:20px;padding:24px;max-width:500px;margin:auto;position:relative;}

/* 탭바 */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:9999;background:white;border-top:1px solid var(--border);display:flex;height:60px;box-shadow:0 -4px 20px rgba(30,30,114,0.08);}
@supports (padding-bottom:env(safe-area-inset-bottom)){.bottom-nav{padding-bottom:env(safe-area-inset-bottom);height:calc(60px + env(safe-area-inset-bottom));}}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;text-decoration:none;color:#bbbbdd;font-size:0.63rem;font-weight:700;transition:color 0.15s;}
.nav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;}
.nav-item.active{color:var(--indigo);}
</style>
</head>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, collection, query, where, getDocs, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const FB = {
  apiKey:"AIzaSyCV4elOllJXF-Rx6qrYNDAwSSfVHKAQelQ",
  authDomain:"supersaver-kit.firebaseapp.com",
  projectId:"supersaver-kit",
  storageBucket:"supersaver-kit.firebasestorage.app",
  messagingSenderId:"800388848026",
  appId:"1:800388848026:web:1d64b6ffebf8544ecb0223"
};
const app = initializeApp(FB);
const auth = getAuth(app);
const db   = getFirestore(app);

// 전역 상태
window._simData = {};
window._compareMode = false;
window._sel = []; // 비교 선택된 id 2개

onAuthStateChanged(auth, async (user) => {
  if (!user) { location.href='../auth.html'; return; }
  const snap = await getDoc(doc(db,'users',user.uid));
  if (!snap.exists() || snap.data().status !== 'approved') {
    await signOut(auth); location.href='../auth.html'; return;
  }
  const d = snap.data();
  document.getElementById('hero-avatar').textContent = (d.name||'?')[0].toUpperCase();
  document.getElementById('hero-name').textContent   = d.name||'-';
  document.getElementById('hero-email').textContent  = d.email||'-';
  document.getElementById('info-name').textContent   = d.name||'-';
  document.getElementById('info-email').textContent  = d.email||'-';
  document.body.style.visibility = 'visible';
  window._auth = auth;
  if (d.role === 'admin') document.getElementById('admin-link').style.display='inline-block';
  loadSims(user.uid);
});

window.doLogout = async () => {
  if (!confirm('로그아웃 하시겠습니까?')) return;
  await signOut(window._auth);
  location.href = '../auth.html';
};

/* ─── 시뮬레이션 로드 ─── */
async function loadSims(uid) {
  try {
    const q = query(collection(db,'simulations'), where('userId','==',uid));
    const snap = await getDocs(q);
    const sims = snap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
    sims.forEach(s=>{ window._simData[s.id]=s; });
    document.getElementById('sim-count').textContent = `총 ${sims.length}건`;
    renderList(sims);
  } catch(e) {
    document.getElementById('sim-list').innerHTML =
      '<div style="text-align:center;padding:20px;color:var(--text-sub);font-size:0.82rem;">불러오기 실패. 새로고침해주세요.</div>';
  }
}

function renderList(sims) {
  const isCmp = window._compareMode;
  if (sims.length === 0) {
    document.getElementById('sim-list').innerHTML =
      '<div style="text-align:center;padding:24px;color:var(--text-sub);font-size:0.85rem;">저장된 시뮬레이션이 없습니다.<br>시뮬레이터에서 결과를 저장해보세요!</div>';
    return;
  }
  document.getElementById('sim-list').innerHTML = sims.map(s => {
    const dt = s.createdAt ? new Date(s.createdAt.seconds*1000).toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'}) : '-';
    const inp = s.inputs||{};
    const isChecked = window._sel.includes(s.id);
    return `
    <div class="sim-item" onclick="${isCmp ? `toggleCheck('${s.id}')` : `showDetail('${s.id}')`}">
      <div class="sim-item-inner">
        ${isCmp ? `<div class="sim-check ${isChecked?'checked':''}" id="chk-${s.id}">
          <svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg></div>` : ''}
        <div style="flex:1;">
          <div style="font-size:0.9rem;font-weight:700;color:var(--indigo-deep);margin-bottom:4px;">${s.title||'제목 없음'}</div>
          <div style="font-size:0.72rem;color:var(--text-sub);margin-bottom:6px;">${dt}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;">
            <span style="background:var(--indigo-lt);color:var(--indigo);font-size:0.65rem;font-weight:700;padding:2px 8px;border-radius:10px;">원금 ${inp.baseApproved||'-'} USDT</span>
            <span style="background:var(--mint-lt);color:var(--mint);font-size:0.65rem;font-weight:700;padding:2px 8px;border-radius:10px;">${inp.weeks||'-'}주</span>
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div style="font-size:0.72rem;color:var(--text-sub);">최종 신용대금</div>
          <div style="font-size:0.95rem;font-weight:900;color:var(--indigo-deep);">${(s.summary||{}).finalApproved||'-'}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

/* ─── 비교 모드 ─── */
window.toggleCompareMode = function() {
  window._compareMode = !window._compareMode;
  window._sel = [];
  const btn = document.getElementById('btn-cmp-mode');
  btn.textContent = window._compareMode ? '취소' : '비교 선택';
  btn.classList.toggle('on', window._compareMode);
  document.getElementById('compare-bar').classList.toggle('active', window._compareMode);
  refreshList();
  updateBar();
};

window.exitCompareMode = function() {
  window._compareMode = false;
  window._sel = [];
  document.getElementById('btn-cmp-mode').textContent = '비교 선택';
  document.getElementById('btn-cmp-mode').classList.remove('on');
  document.getElementById('compare-bar').classList.remove('active');
  refreshList();
};

window.toggleCheck = function(id) {
  const sel = window._sel;
  const idx = sel.indexOf(id);
  if (idx >= 0) {
    sel.splice(idx,1);
  } else {
    if (sel.length >= 2) {
      const old = sel.shift();
      const el = document.getElementById('chk-'+old);
      if (el) el.classList.remove('checked');
    }
    sel.push(id);
  }
  const el = document.getElementById('chk-'+id);
  if (el) el.classList.toggle('checked', sel.includes(id));
  updateBar();
};

function updateBar() {
  const n = window._sel.length;
  document.getElementById('cmp-bar-count').textContent = `${n} / 2개 선택됨`;
  document.getElementById('btn-do-cmp').disabled = (n !== 2);
}

function refreshList() {
  const sims = Object.values(window._simData)
    .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  renderList(sims);
}

/* ─── 비교 실행 ─── */
window.doCompare = function() {
  const [idA,idB] = window._sel;
  const a = window._simData[idA];
  const b = window._simData[idB];
  if (!a||!b) return;

  const fdt = s => s.createdAt ? new Date(s.createdAt.seconds*1000).toLocaleDateString('ko-KR',{month:'short',day:'numeric'}) : '-';
  document.getElementById('cmp-title-a').textContent = a.title||'제목 없음';
  document.getElementById('cmp-title-b').textContent = b.title||'제목 없음';
  document.getElementById('cmp-date-a').textContent = fdt(a);
  document.getElementById('cmp-date-b').textContent = fdt(b);

  const p = v => parseFloat((v||'').toString().replace(/[^0-9.\-]/g,''))||0;

  const inpRows = [
    ['원금 (신용대금)', s=>(s.inputs?.baseApproved||'-')+' USDT', null],
    ['일 지급금',    s=>(s.inputs?.baseDaily||'-')+' USDT',      null],
    ['기간',       s=>(s.inputs?.weeks||'-')+'주',              (a,b)=>p(a.inputs?.weeks)-p(b.inputs?.weeks)],
    ['CR 가격',    s=>(s.inputs?.creditPrice||'-')+' USDT',    null],
    ['SUT 가격',   s=>(s.inputs?.sutPrice||'-')+' USDT',       null],
    ['SUT 변화율', s=>(s.inputs?.sutChangeRate||'-')+'%',      null],
    ['CR 변화율',  s=>(s.inputs?.crChangeRate||'-')+'%',       null],
  ];
  const sumRows = [
    ['최종 신용대금',    s=>(s.summary?.finalApproved||'-'), (a,b)=>p(a.summary?.finalApproved)-p(b.summary?.finalApproved)],
    ['일 지급금',      s=>(s.summary?.finalDaily||'-'),    (a,b)=>p(a.summary?.finalDaily)-p(b.summary?.finalDaily)],
    ['주 지급금',      s=>(s.summary?.finalWeekly||'-'),   (a,b)=>p(a.summary?.finalWeekly)-p(b.summary?.finalWeekly)],
    ['총 주정산',    s=>(s.summary?.totalWeekly||'-'),   (a,b)=>p(a.summary?.totalWeekly)-p(b.summary?.totalWeekly)],
    ['총 재참여',      s=>(s.summary?.totalContract||'-'), (a,b)=>p(a.summary?.totalContract)-p(b.summary?.totalContract)],
    ['총 2단계비용', s=>(s.summary?.totalCost||'-'),     (a,b)=>p(b.summary?.totalCost)-p(a.summary?.totalCost)],
  ];

  document.getElementById('cmp-inp-tbl').innerHTML = buildTbl(a,b,inpRows);
  document.getElementById('cmp-sum-tbl').innerHTML = buildTbl(a,b,sumRows);
  document.getElementById('compare-modal').style.display = 'block';
  document.getElementById('compare-modal').scrollTop = 0;
};

function buildTbl(a,b,rows) {
  return rows.map(([lbl,fn,diffFn])=>{
    const va=fn(a), vb=fn(b);
    let ba='', bb='';
    if (diffFn) {
      const d=diffFn(a,b);
      if (d>0) ba='<span class="win-badge win-a">▲</span>';
      else if (d<0) bb='<span class="win-badge win-b">▲</span>';
    }
    return `<div class="cmp-row">
      <div class="cmp-cell cmp-lbl">${lbl}</div>
      <div class="cmp-cell cmp-a">${va}${ba}</div>
      <div class="cmp-cell cmp-b">${vb}${bb}</div>
    </div>`;
  }).join('');
}

/* ─── 상세 모달 ─── */
window.showDetail = function(id) {
  const s = window._simData[id];
  if (!s) return;
  window._currentSimId = id;
  document.getElementById('modal-title').textContent = s.title||'제목 없음';
  const dt = s.createdAt ? new Date(s.createdAt.seconds*1000).toLocaleString('ko-KR') : '-';
  document.getElementById('modal-date').textContent = `저장일시: ${dt}`;
  const inp = s.inputs||{};
  document.getElementById('modal-inputs').innerHTML = [
    ['원금(신용대금)', inp.baseApproved+' USDT'],['일지급금', inp.baseDaily+' USDT'],
    ['기간', inp.weeks+'주'],['CR가격', inp.creditPrice+' USDT'],
    ['SUT가격', inp.sutPrice+' USDT'],['SUT변화율', inp.sutChangeRate+'%'],['CR변화율', inp.crChangeRate+'%'],
  ].map(([k,v])=>`<div><div style="font-size:0.65rem;color:var(--text-sub);margin-bottom:2px;">${k}</div><div style="font-size:0.82rem;font-weight:700;color:var(--indigo-deep);">${v}</div></div>`).join('');
  const sum=s.summary||{};
  document.getElementById('modal-summary').innerHTML = [
    ['최종 신용대금',sum.finalApproved],['일 지급금',sum.finalDaily],
    ['주 지급금',sum.finalWeekly],['총 주정산',sum.totalWeekly],
    ['총 재참여',sum.totalContract],['총 2단계비용',sum.totalCost],
  ].map(([k,v])=>`<div><div style="font-size:0.65rem;color:rgba(255,255,255,0.6);margin-bottom:2px;">${k}</div><div style="font-size:0.82rem;font-weight:700;color:white;">${v||'-'}</div></div>`).join('');
  document.getElementById('modal-weekly').innerHTML = (s.weeklyData||[]).map(w=>
    `<tr style="border-bottom:1px solid var(--border);">
      <td style="padding:5px 4px;text-align:center;font-weight:700;color:var(--text-sub);">${w.week}</td>
      <td style="padding:5px 4px;text-align:right;color:var(--indigo-deep);">${w.date}</td>
      <td style="padding:5px 4px;text-align:right;color:var(--mint);">${w.contract||'-'}</td>
      <td style="padding:5px 4px;text-align:right;color:var(--indigo);">${w.daily||'-'}</td>
      <td style="padding:5px 4px;text-align:right;color:var(--indigo-deep);">${w.approved||'-'}</td>
    </tr>`).join('');
  document.getElementById('sim-modal').style.display='block';
  document.getElementById('sim-modal').scrollTop=0;
};

window.deleteSimulation = async function(id) {
  if (!confirm('이 시뮬레이션 기록을 삭제하시겠습니까?')) return;
  try {
    await deleteDoc(doc(db,'simulations',id));
    document.getElementById('sim-modal').style.display='none';
    delete window._simData[id];
    const cnt = Object.keys(window._simData).length;
    document.getElementById('sim-count').textContent = `총 ${cnt}건`;
    refreshList();
  } catch(e) { alert('삭제 중 오류가 발생했습니다.'); }
};
</script>
